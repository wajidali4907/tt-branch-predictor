# Tiny Tapeout project information
project:
  title:        "2-Bit Branch Predictor"
  author:       "Wajid Ali"
  discord:      ""
  description:  "A 16-entry Branch History Table (BHT) using 2-bit saturating counters. Predicts branch outcomes based on past behavior indexed by PC bits."
  language:     "Verilog"
  clock_hz:     10000000
  tiles: "1x1"
  top_module:  "tt_um_branch_predictor"
  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "pc_index[0]"
  ui[1]: "pc_index[1]"
  ui[2]: "pc_index[2]"
  ui[3]: "pc_index[3]"
  ui[4]: "outcome"
  ui[5]: "update"
  ui[6]: ""
  ui[7]: ""
  # Outputs
  uo[0]: "prediction"
  uo[1]: "state[0]"
  uo[2]: "state[1]"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""
  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
